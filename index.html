<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Rukiye SAATCI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyber-blue: #0070f3;
            --bg-dark: #000000;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* GRILLE ANIMÉE DISCRÈTE */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.4;
        }

        /* NAVIGATION MATHIEU STYLE */
        nav {
            position: fixed;
            top: 40px; right: 60px;
            z-index: 100;
            display: flex; gap: 30px;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-family: 'Fira Code', monospace;
            transition: 0.3s;
        }
        nav a:hover { color: #fff; }

        /* CONTENU PRINCIPAL */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%;
        }

        .name {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -4px; /* Effet pro Mathieu */
            line-height: 0.9;
            margin-bottom: 20px;
            text-transform: none;
        }

        .name span {
            text-transform: uppercase; /* Nom de famille en majuscules */
        }

        .job-line {
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* EFFET MACHINE À ÉCRIRE */
        .typewriter {
            color: var(--cyber-blue);
            display: inline-block;
            border-right: 2px solid var(--cyber-blue);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3s steps(30, end) forwards, blink 0.8s infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from { border-color: transparent } to { border-color: var(--cyber-blue) } }

        /* BADGES SOBRES */
        .badges { display: flex; gap: 12px; }
        .badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <nav>
        <a href="#">// PROFIL</a>
        <a href="#">// PARCOURS</a>
        <a href="#">// CONTACT</a>
    </nav>

    <main class="hero">
        <h1 class="name">Rukiye<br><span>SAATCI</span></h1>
        <div class="job-line">
            Ambition : <span class="typewriter">Experte en Cybersécurité</span>
        </div>
        <div class="badges">
            <div class="badge">BTS SIO SISR</div>
            <div class="badge">CISCO</div>
            <div class="badge">LINUX</div>
            <div class="badge">SÉCURITÉ</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 500;
            camera.position.y = 200;
            camera.rotation.x = -0.5;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const numX = 60, numY = 50;
            const positions = new Float32Array(numX * numY * 3);
            const geometry = new THREE.BufferGeometry();
            
            let i = 0;
            for (let x = 0; x < numX; x++) {
                for (let y = 0; y < numY; y++) {
                    positions[i] = x * 35 - (numX * 35 / 2);
                    positions[i + 1] = y * 35 - (numY * 35 / 2);
                    positions[i + 2] = 0;
                    i += 3;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0x0070f3, size: 1.5, transparent: true, opacity: 0.3 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const positions = particles.geometry.attributes.position.array;
            let i = 0;
            const time = Date.now() * 0.0008;

            for (let x = 0; x < 60; x++) {
                for (let y = 0; y < 50; y++) {
                    positions[i + 2] = Math.sin(x * 0.2 + time) * 35 + Math.cos(y * 0.2 + time) * 35;
                    i += 3;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
