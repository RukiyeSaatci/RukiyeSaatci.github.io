<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | SAATCI Rukiye</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #00ff41;
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center; /* Centre verticalement pour que le texte soit au milieu */
        }

        /* FOND MATRIX ULTRA DISCRET (STYLE MATHIEU : SOBRE) */
        #canvas-matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.15; /* Réduit la visibilité pour que ce soit calme */
        }

        /* INTERFACE PRINCIPALE (STYLE MATHIEU : ALIGNÉ À GAUCHE) */
        .wrapper {
            position: relative;
            z-index: 10;
            padding-left: 10%; /* Grand espace à gauche */
            width: 100%;
        }

        /* VOTRE NOM STYLE MATHIEU (FIN ET GRAND) */
        h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 10px;
            text-transform: none;
        }

        h1 span {
            text-transform: uppercase;
        }

        /* AMBITION ÉPURÉE STYLE MATHIEU */
        .job-title {
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* BADGES COMPÉTENCES DISCRETS */
        .badge-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
        }

        /* NAVIGATION SOBRE (STYLE MATHIEU L.) */
        nav {
            position: fixed;
            top: 40px;
            right: 60px;
            z-index: 100;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-family: 'Fira Code', monospace;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover { color: #fff; }

    </style>
</head>
<body>

    <canvas id="canvas-matrix"></canvas>

    <nav>
        <a href="#about">// PROFIL</a>
        <a href="#projects">// PROJETS</a>
        <a href="#contact">// CONTACT</a>
    </nav>

    <div class="wrapper">
        <h1>Rukiye<br><span>SAATCI</span></h1>
        
        <div class="job-title">
            Ambition : Experte en cybersécurité
        </div>

        <div class="badge-container">
            <div class="badge">BTS SIO SISR</div>
            <div class="badge">CISCO CCNA</div>
            <div class="badge">LINUX / DEBIAN</div>
            <div class="badge">SÉCURITÉ INFRA</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas-matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41'; /* Vert mais très discret car opacity du canvas est faible */
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        setInterval(draw, 40);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
