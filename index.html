<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Rukiye SAATCI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Fira+Code&display=swap" rel="stylesheet">

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .font-code { font-family: 'Fira Code', monospace; }
        
        /* Grille de fond animée */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.4; }

        /* Effet de texte qui brille au survol */
        .name-hover:hover {
            color: #0070f3;
            text-shadow: 0 0 20px rgba(0, 112, 243, 0.6);
            transition: 0.4s;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <nav class="fixed top-12 right-16 z-50 flex gap-8 font-code text-xs tracking-widest text-gray-500">
        <a href="#" class="hover:text-white transition">// PROFIL</a>
        <a href="#" class="hover:text-white transition">// PARCOURS</a>
        <a href="#" class="hover:text-white transition">// CONTACT</a>
    </nav>

    <main class="relative z-10 h-screen flex flex-col justify-center pl-[12%]">
        <h1 class="hero-name text-[7rem] font-black leading-[0.85] tracking-[-0.05em] mb-6">
            Rukiye<br><span class="uppercase name-hover">SAATCI</span>
        </h1>
        
        <div class="font-code text-lg text-gray-500 flex items-center gap-3 mb-10">
            <span>Ambition :</span>
            <span id="typewriter" class="text-[#0070f3] border-r-2 border-[#0070f3] pr-1"></span>
        </div>

        <div class="flex gap-4">
            <div class="px-4 py-2 bg-white/5 border border-white/10 rounded text-[10px] font-code text-gray-600 uppercase tracking-widest hover:border-[#0070f3] hover:text-[#0070f3] transition duration-500">BTS SIO SISR</div>
            <div class="px-4 py-2 bg-white/5 border border-white/10 rounded text-[10px] font-code text-gray-600 uppercase tracking-widest hover:border-[#0070f3] hover:text-[#0070f3] transition duration-500">CISCO RÉSEAUX</div>
            <div class="px-4 py-2 bg-white/5 border border-white/10 rounded text-[10px] font-code text-gray-600 uppercase tracking-widest hover:border-[#0070f3] hover:text-[#0070f3] transition duration-500">CYBERSÉCURITÉ</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Animation de la machine à écrire
        const text = "Experte en Cybersécurité";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 100);
            }
        }
        window.onload = type;

        // 2. Animation de la grille de fond (Three.js)
        let scene, camera, renderer, points;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 400;
            camera.position.y = 100;
            camera.rotation.x = -0.2;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            for (let i = 0; i < 3000; i++) {
                positions.push((Math.random() - 0.5) * 1500);
                positions.push((Math.random() - 0.5) * 1500);
                positions.push((Math.random() - 0.5) * 500);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            const material = new THREE.PointsMaterial({ color: 0x0070f3, size: 1.5, transparent: true, opacity: 0.5 });
            points = new THREE.Points(geometry, material);
            scene.add(points);
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
