<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAATCI Rukiye | Portfolio Cybersécurité</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyber-blue: #0070f3; /* Le bleu électrique vif de Julien/Mathieu */
            --bg-dark: #000000; /* Noir pur pour le fond */
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden; /* Garde le dashboard fixe */
            display: flex;
            align-items: center; /* Centre le contenu verticalement */
        }

        /* 1. L'ANIMATION DE FOND 3D (Vague Géométrique) */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Derrière le contenu */
            opacity: 0.6; /* Transparence pour ne pas gêner la lecture */
        }

        /* 2. LE CONTENU PRINCIPAL ALIGNÉ À GAUCHE */
        .content {
            position: relative;
            z-index: 10;
            padding-left: 10%; /* Grand espace à gauche comme Mathieu/Julien */
            max-width: 800px;
        }

        /* VOTRE NOM STYLE JULIEN (ÉNROME ET MAJUSCULES) */
        .hero-name {
            font-size: 5rem; /* Taille massive */
            font-weight: 900;
            letter-spacing: -4px; /* Rapproche les lettres style pro */
            line-height: 0.9; /* Rapproche les lignes style pro */
            margin-bottom: 15px;
        }
        .hero-name span {
            text-transform: uppercase; /* Nom de famille en majuscules */
        }

        /* AMBITION AVEC EFFET MACHINE À ÉCRIRE */
        .profession-container {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .typing-text {
            color: var(--cyber-blue);
            border-right: 3px solid var(--cyber-blue);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3.5s steps(35, end) forwards, blink 0.8s infinite;
            text-shadow: 0 0 10px var(--cyber-blue);
        }

        /* Keyframes pour l'effet de frappe */
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from { border-color: transparent } to { border-color: var(--cyber-blue) } }

        /* BADGES DE COMPÉTENCES STYLE MATHIEU */
        .skills-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255, 255, 255, 0.03); /* Gris très foncé translucide */
            border: 1px solid rgba(255, 255, 255, 0.08); /* Bordure fine */
            color: #555; /* Gris clair */
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'Fira Code', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.4s;
        }
        .badge:hover {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
            background: rgba(0, 112, 243, 0.05);
        }

        /* NAVIGATION DISCRÈTE EN HAUT À DROITE */
        nav {
            position: fixed;
            top: 50px; right: 80px;
            z-index: 100;
            display: flex; gap: 40px;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: 'Fira Code', monospace;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        nav a:hover { color: #fff; }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <nav>
        <a href="#about">// PROFIL</a>
        <a href="#parcours">// PARCOURS</a>
        <a href="#contact">// CONTACT</a>
    </nav>

    <main class="content">
        <h1 class="hero-name">Rukiye<br><span>SAATCI</span></h1>
        
        <div class="profession-container">
            <span>Ambition :</span>
            <span class="typing-text">Experte en Cybersécurité</span>
        </div>

        <div class="skills-group">
            <div class="badge">BTS SIO SISR</div>
            <div class="badge">CISCO CCNA</div>
            <div class="badge">LINUX / DEBIAN</div>
            <div class="badge">SECURITÉ</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cloud;
        let numParticles = 3000;
        let positions = new Float32Array(numParticles * 3);
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 400;
            camera.position.y = 150;
            camera.rotation.x = -0.4;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.BufferGeometry();
            
            // Création de la grille de points
            let i = 0;
            for (let x = 0; x < 60; x++) {
                for (let y = 0; y < 50; y++) {
                    positions[i] = x * 30 - 900;
                    positions[i + 1] = y * 30 - 750;
                    positions[i + 2] = 0;
                    i += 3;
                }
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({ color: 0x0070f3, size: 2, transparent: true, opacity: 0.5 });
            cloud = new THREE.Points(geometry, material);
            scene.add(cloud);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const positions = cloud.geometry.attributes.position.array;
            let i = 0;
            const time = Date.now() * 0.001;

            // Animation de la vague (Math.sin)
            for (let x = 0; x < 60; x++) {
                for (let y = 0; y < 50; y++) {
                    positions[i + 2] = Math.sin(x * 0.3 + time) * 30 + Math.cos(y * 0.2 + time) * 30;
                    i += 3;
                }
            }
            cloud.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
