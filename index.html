<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Rukiye SAATCI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        /* CONFIGURATION GLOBALE CYBER */
        :root {
            --cyber-blue: #0070f3; /* Le bleu vif de Mathieu */
            --bg-dark: #000000; /* Noir pur */
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* GESTION DU FOND ANIMÉ (PARTICLES) */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Derrière le contenu */
        }

        /* CONTENU PRINCIPAL ALIGNÉ À GAUCHE */
        .content-left {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centre verticalement */
            height: 100vh;
            padding-left: 10%; /* Marge à gauche style Mathieu */
            text-align: left;
        }

        /* VOTRE NOM STYLE MATHIEU */
        .hero-name {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 10px;
        }

        /* AMBITION AVEC EFFET MACHINE À ÉCRIRE */
        .profession-container {
            font-family: 'Courier Prime', monospace;
            font-size: 1.2rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .typing-text {
            color: var(--cyber-blue);
            border-right: 2px solid var(--cyber-blue);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3.5s steps(40, end) forwards, blink 0.8s infinite;
            text-shadow: 0 0 10px var(--cyber-blue);
        }

        /* Keyframes pour l'effet de frappe */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        /* Keyframes pour le curseur qui clignote */
        @keyframes blink {
            from { border-color: transparent }
            to { border-color: var(--cyber-blue) }
        }

        /* BADGES DE COMPÉTENCES STYLE MATHIEU */
        .skills-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(0, 112, 243, 0.1);
            border: 1px solid rgba(0, 112, 243, 0.3);
            color: var(--cyber-blue);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-family: monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .badge:hover {
            border-color: var(--cyber-blue);
            box-shadow: 0 0 10px rgba(0, 112, 243, 0.2);
        }

        /* NAVIGATION DISCRÈTE EN HAUT À DROITE */
        nav {
            position: fixed;
            top: 40px;
            right: 60px;
            z-index: 100;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover {
            color: #fff;
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav>
        <a href="#about">// PROFIL</a>
        <a href="#parcours">// PARCOURS</a>
        <a href="#contact">// CONTACT</a>
    </nav>

    <main class="content-left">
        <h1 class="hero-name">Rukiye<br>SAATCI</h1>
        
        <div class="profession-container">
            <span>Ambition :</span>
            <span class="typing-text">Experte en Cybersécurité</span>
        </div>

        <div class="skills-group">
            <div class="badge">BTS SIO SISR</div>
            <div class="badge">CISCO RÉSEAUX</div>
            <div class="badge
            ">LINUX / DEBIAN</div>
            <div class="badge">WINDOWS SERVER</div>
            <div class="badge">AUDIT DE SÉCURITÉ</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#0070f3" }, /* Couleur des particules en bleu */
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": false },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#0070f3", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
