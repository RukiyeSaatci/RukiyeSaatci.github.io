<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAATCI Rukiye | SYSTEM EXPLOIT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-green: #003b00;
            --bg-black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-black);
            color: var(--matrix-green);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* 1. EFFET MATRIX BACKGROUND (CANVAS) */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.2;
        }

        /* 2. OVERLAY INTERFACE */
        .interface {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
            padding: 20px;
            gap: 20px;
        }

        /* STYLE FENÊTRE TERMINAL */
        .window {
            border: 1px solid var(--matrix-green);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .window::before {
            content: "[ TERMINAL_SECURE ]";
            display: block;
            background: var(--matrix-green);
            color: black;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 10px;
            margin-bottom: 15px;
        }

        /* HEADER & NOM */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 50px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--matrix-green);
        }

        .ambition {
            font-size: 1.2rem;
            color: white;
            border-left: 3px solid var(--matrix-green);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        /* NAVIGATION GAUCHE */
        .nav-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .nav-item {
            color: var(--matrix-green);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .nav-item:hover {
            background: var(--matrix-green);
            color: black;
            box-shadow: 0 0 10px var(--matrix-green);
        }

        /* LOGS DÉFILANTS (EFFET ANALYSE) */
        .logs {
            font-size: 0.7rem;
            color: var(--dark-green);
            height: 150px;
            overflow: hidden;
            margin-top: 20px;
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="interface">
        <aside class="window nav-sidebar">
            <a href="#" class="nav-item">/root/presentation</a>
            <a href="#" class="nav-item">/root/competences</a>
            <a href="#" class="nav-item">/root/parcours</a>
            <a href="#" class="nav-item">/root/contact</a>
            
            <div class="logs" id="log-container">
                </div>
        </aside>

        <main class="hero-section">
            <div class="window" style="border:none; background:none; box-shadow:none;">
                <p style="font-size: 0.8rem;">> INITIALIZING_IDENTITY_SCAN...</p>
                <h1>Rukiye<br><span style="color:white;">SAATCI</span></h1>
                <div class="ambition">
                    <span class="blink">></span> AMBITION: EXPERTE EN CYBERSÉCURITÉ
                </div>
                <p style="color:#666; font-size: 0.8rem; max-width: 500px;">
                    Étudiante en BTS SIO SISR au CNED. Spécialisée dans l'analyse de vulnérabilités et la défense périmétrique des systèmes d'information.
                </p>
            </div>
        </main>
    </div>

    <script>
        // --- ANIMATION MATRIX ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- GENERATEUR DE LOGS ---
        const logContainer = document.getElementById('log-container');
        const messages = [
            "SCANNING_PORT: 80...", "ACCESS_GRANTED", "ENCRYPTING_DATA...",
            "TRACING_IP: 192.168.1.1", "FIREWALL: ACTIVE", "KERNEL_LOADED",
            "THREAT_LEVEL: ZERO", "BYPASSING_PROXY...", "CLEANING_CACHE..."
        ];

        function addLog() {
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${messages[Math.floor(Math.random() * messages.length)]}`;
            logContainer.prepend(p);
            if (logContainer.children.length > 10) logContainer.lastChild.remove();
        }
        setInterval(addLog, 1000);
    </script>
</body>
</html>
