<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Rukiye SAATCI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyber-blue: #0070f3;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center; /* Centre le contenu verticalement */
        }

        /* FOND ANIMÉ : GRILLE DE POINTS DISCRÈTE */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.3;
        }

        /* NAVIGATION DISCRÈTE STYLE MATHIEU */
        nav {
            position: fixed;
            top: 50px; right: 80px;
            z-index: 100;
            display: flex; gap: 40px;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: 'Fira Code', monospace;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        nav a:hover { color: #fff; }

        /* CONTENU ALIGNÉ À GAUCHE */
        .hero-section {
            position: relative;
            z-index: 10;
            padding-left: 12%; /* Marge exacte */
            max-width: 800px;
        }

        .name-container {
            font-size: 5.5rem; /* Taille massive comme Mathieu */
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -5px; /* Lettres très serrées */
            margin-bottom: 25px;
        }

        .name-container span {
            text-transform: uppercase;
        }

        .ambition-line {
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 45px;
        }

        /* ANIMATION MACHINE À ÉCRIRE */
        .typing {
            color: var(--cyber-blue);
            display: inline-block;
            border-right: 3px solid var(--cyber-blue);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: type 3.5s steps(35, end) forwards, blink 0.8s infinite;
        }

        @keyframes type { from { width: 0 } to { width: 100% } }
        @keyframes blink { from { border-color: transparent } to { border-color: var(--cyber-blue) } }

        /* BADGES MINIMALISTES */
        .badges-container {
            display: flex;
            gap: 15px;
        }
        .badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #555;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
        }
        .badge:hover {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
            background: rgba(0, 112, 243, 0.05);
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <nav>
        <a href="#">// PROFIL</a>
        <a href="#">// PARCOURS</a>
        <a href="#">// CONTACT</a>
    </nav>

    <main class="hero-section">
        <h1 class="name-container">Rukiye<br><span>SAATCI</span></h1>
        
        <div class="ambition-line">
            Ambition : <span class="typing">Experte en Cybersécurité</span>
        </div>

        <div class="badges-container">
            <div class="badge">BTS SIO SISR</div>
            <div class="badge">CISCO CCNA</div>
            <div class="badge">LINUX / DEBIAN</div>
            <div class="badge">CYBER-SÉCURITÉ</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cloud;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 400;
            camera.position.y = 150;
            camera.rotation.x = -0.4;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-bg'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 4000; i++) {
                pos.push((Math.random() - 0.5) * 1500);
                pos.push((Math.random() - 0.5) * 1500);
                pos.push((Math.random() - 0.5) * 400);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
            
            const material = new THREE.PointsMaterial({ color: 0x0070f3, size: 1.5, transparent: true, opacity: 0.4 });
            cloud = new THREE.Points(geometry, material);
            scene.add(cloud);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            cloud.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
