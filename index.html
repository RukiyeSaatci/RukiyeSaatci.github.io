<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rukiye SAATCI | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyber-blue: #0070f3; /* Le bleu de Mathieu */
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* FOND ANIMÉ */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* CONTENU PRINCIPAL */
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%;
        }

        /* TEXTE À GAUCHE STYLE MATHIEU */
        .name {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .profession-container {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ANIMATION TEXTE EXPERTE CYBER */
        .typing-text {
            color: var(--cyber-blue);
            border-right: 2px solid var(--cyber-blue);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3s steps(30, end) forwards, blink 0.8s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from { border-color: transparent }
            to { border-color: var(--cyber-blue) }
        }

        /* BADGES COMPÉTENCES EN BAS */
        .skills {
            margin-top: 50px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 112, 243, 0.1);
            border: 1px solid rgba(0, 112, 243, 0.3);
            color: var(--cyber-blue);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
        }

        /* NAV DISCRÈTE */
        nav {
            position: fixed;
            top: 40px;
            right: 60px;
            z-index: 100;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover { color: #fff; }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav>
        <a href="#about">A PROPOS</a>
        <a href="#projects">PROJETS</a>
        <a href="#contact">CONTACT</a>
    </nav>

    <main class="content">
        <h1 class="name">Rukiye<br>SAATCI</h1>
        
        <div class="profession-container">
            <span>Ambition :</span>
            <span class="typing-text">Experte en Cybersécurité</span>
        </div>

        <div class="skills">
            <div class="badge">BTS SIO SISR</div>
            <div class="badge">CISCO RÉSEAUX</div>
            <div class="badge">LINUX / DEBIAN</div>
            <div class="badge">WINDOWS SERVER</div>
            <div class="badge">AUDIT DE SÉCURITÉ</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#0070f3" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": false },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#0070f3", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
